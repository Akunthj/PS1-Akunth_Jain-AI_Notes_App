<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Notes</title>
  </head>
  <body>
    <!--
      This is the single HTML page of our React app.
      React renders everything inside this div.
      The actual content is injected by JavaScript (see main.jsx).
    -->
    <div id="root"></div>

    <!--
      Vite automatically injects the script tag for our React code.
      We point it at main.jsx which is the entry point.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
